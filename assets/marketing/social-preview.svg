<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Web Element Selector social preview</title>
  <desc id="desc">Social preview card for Web Element Selector showing the main workflow and product positioning.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1110"/>
      <stop offset="52%" stop-color="#161b1c"/>
      <stop offset="100%" stop-color="#0a0d0d"/>
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="34"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="150" cy="112" r="160" fill="#4ade80" fill-opacity="0.2" filter="url(#soft)"/>
  <circle cx="1040" cy="520" r="170" fill="#22d3ee" fill-opacity="0.12" filter="url(#soft)"/>

  <g transform="translate(68 68)">
    <text x="0" y="0" fill="#8bf0b0" font-family="Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="3">WEB ELEMENT SELECTOR</text>
    <text x="0" y="78" fill="#f5f7f7" font-family="Arial, sans-serif" font-size="58" font-weight="700">Select page regions.</text>
    <text x="0" y="144" fill="#f5f7f7" font-family="Arial, sans-serif" font-size="58" font-weight="700">Write a task. Copy for AI.</text>
    <text x="0" y="212" fill="#b4bcbd" font-family="Arial, sans-serif" font-size="24">A bookmarklet and browser extension for Codex, Claude Code, Cursor, and AI-assisted UI editing.</text>

    <g transform="translate(0 274)">
      <rect x="0" y="0" width="218" height="54" rx="16" fill="#90f0b1"/>
      <text x="109" y="35" fill="#112018" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700">Install Extension</text>
      <rect x="236" y="0" width="204" height="54" rx="16" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.08"/>
      <text x="338" y="35" fill="#f7f7f7" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700">Use Bookmarklet</text>
    </g>

    <g transform="translate(0 380)">
      <rect x="0" y="0" width="130" height="42" rx="14" fill="#ffffff" fill-opacity="0.06"/>
      <text x="65" y="28" fill="#dbe1e2" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700">Launch</text>
      <rect x="146" y="0" width="130" height="42" rx="14" fill="#ffffff" fill-opacity="0.06"/>
      <text x="211" y="28" fill="#dbe1e2" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700">Select</text>
      <rect x="292" y="0" width="130" height="42" rx="14" fill="#ffffff" fill-opacity="0.06"/>
      <text x="357" y="28" fill="#dbe1e2" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700">Copy</text>
    </g>
  </g>

  <g transform="translate(690 62)">
    <rect x="0" y="0" width="442" height="506" rx="30" fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.08"/>
    <rect x="24" y="24" width="394" height="220" rx="24" fill="#eef1f3"/>
    <rect x="46" y="52" width="164" height="16" rx="8" fill="#d7dce1"/>
    <rect x="46" y="82" width="254" height="11" rx="5.5" fill="#e0e4e7"/>
    <rect x="46" y="116" width="308" height="86" rx="20" fill="#ffffff"/>
    <rect x="56" y="126" width="288" height="66" rx="18" fill="none" stroke="#111111" stroke-width="3"/>
    <rect x="52" y="122" width="296" height="74" rx="20" fill="#111111" fill-opacity="0.04"/>
    <rect x="338" y="114" width="22" height="22" rx="6" fill="#2d3338"/>
    <rect x="300" y="42" width="98" height="128" rx="18" fill="#101315"/>
    <text x="319" y="66" fill="#8bf0b0" font-family="Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="1.5">POPUP</text>
    <text x="319" y="92" fill="#f6f7f7" font-family="Arial, sans-serif" font-size="18" font-weight="700">Launch Selector</text>
    <rect x="319" y="112" width="60" height="24" rx="10" fill="#f4f5f5"/>

    <rect x="24" y="268" width="394" height="214" rx="24" fill="#101315" stroke="#ffffff" stroke-opacity="0.06"/>
    <text x="46" y="304" fill="#8bf0b0" font-family="Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="2">COPY FOR CODEX</text>
    <text x="46" y="344" fill="#f6f7f7" font-family="Arial, sans-serif" font-size="22" font-weight="700">Task</text>
    <text x="46" y="376" fill="#bcc5c7" font-family="Arial, sans-serif" font-size="17">Improve the hierarchy and spacing in this section.</text>
    <text x="46" y="430" fill="#f6f7f7" font-family="Arial, sans-serif" font-size="22" font-weight="700">Selected Elements</text>
    <text x="46" y="462" fill="#d9dfe0" font-family="Courier New, monospace" font-size="14">1. .hero-title &lt;h1&gt;</text>
  </g>
</svg>
